<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Закупки</title>
    <link rel="manifest" href="manifest.json">
    </head>
<body>

    <button id="logoutButton" class="nav-button" type="button" hidden>Выйти</button>

    <dialog id="loginDialog" style="border: none; border-radius: 8px; padding: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.15);">
      <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px; padding: 25px; width: 280px;">
        <h3 style="margin: 0 0 10px 0; text-align: center;">Вход в систему</h3>
        <input type="email" name="email" placeholder="Email" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <input type="password" name="password" placeholder="Пароль" required style="padding: 10px; border: 1px solid #ccc; border-radius: 4px;">
        <button type="submit" style="padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Войти</button>
      </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>

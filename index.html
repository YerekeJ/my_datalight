<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#090d12">
    <title>Закупки</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">CRM закупок</p>
                <h1>Закупки</h1>
            </div>
            <button id="logoutButton" type="button" class="danger-action" style="display:none;">Выйти</button>
        </header>

        <main>
            <section id="dashboard" class="view active">
                <div class="metric-grid">
                    <div class="metric">
                        <span>Всего заявок</span>
                        <strong id="totalLots">0</strong>
                    </div>
                    <div class="metric">
                        <span>Выручка за месяц</span>
                        <strong id="monthRevenue">0 ₸</strong>
                    </div>
                </div>
                <div class="panel">
                    <div class="panel-title"><h3>Ближайшие дедлайны</h3></div>
                    <div id="deadlineList" class="deadline-list"></div>
                </div>
            </section>

            <section id="lots" class="view">
                <div class="section-head">
                    <h2>Заявки</h2>
                    <button data-open-lot type="button" class="primary-action">+ Добавить лот</button>
                </div>
                <div class="toolbar">
                    <input type="text" id="lotSearch" placeholder="Поиск лотов...">
                    <select id="statusFilter"></select>
                </div>
                <div id="lotsList" class="list"></div>
            </section>

            <section id="calculations" class="view">
                <div class="section-head">
                    <h2>Есептер</h2>
                    <button data-open-calc type="button" class="primary-action">+ Добавить есеп</button>
                </div>
                <div class="toolbar">
                    <input type="text" id="calcSearch" placeholder="Поиск по номеру лота...">
                </div>
                <div id="calcList" class="list"></div>

                <div class="panel" style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">
                    <button id="backupButton" type="button" class="secondary-action">Скачать бэкап</button>
                    <button id="importButton" type="button" class="secondary-action">Импорт данных</button>
                    <input type="file" id="importInput" accept=".json" class="hidden">
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-button active" data-view="dashboard">Главная</button>
            <button class="nav-button" data-view="lots">Заявки</button>
            <button class="nav-button" data-view="calculations">Есептер</button>
        </nav>
    </div>

    <dialog id="lotDialog">
        <form id="lotForm" method="dialog" class="dialog-form">
            <div class="dialog-head"><h3>Лот</h3></div>
            <input type="hidden" name="id">
            <label>Номер лота * <input type="text" name="lotNumber" required></label>
            <label>Статус * <select name="status"></select></label>
            <label>Наименование <input type="text" name="name"></label>
            <label>Категория <input type="text" name="category"></label>
            <label>Срок (Дедлайн) <input type="datetime-local" name="deadline"></label>
            <label>Адрес <input type="text" name="address"></label>
            <label>Бюджет <input type="text" name="budget"></label>
            <label>Комментарий <textarea name="comment" rows="2"></textarea></label>
            <label>Ссылка <input type="text" name="link"></label>
            <label>Документы <input type="text" name="docs"></label>
            <label>Дата закрытия <input type="date" name="closedAt"></label>
            <div class="dialog-actions">
                <button type="button" data-close-dialog="lotDialog" class="secondary-action">Отмена</button>
                <button type="button" id="deleteLotButton" class="danger-action hidden">Удалить</button>
                <button type="submit" class="primary-action">Сохранить</button>
            </div>
        </form>
    </dialog>

    <dialog id="calcDialog">
        <form id="calcForm" method="dialog" class="dialog-form">
            <div class="dialog-head"><h3>Есеп</h3></div>
            <input type="hidden" name="id">
            <label>Выберите лот * <select name="lotId" required></select></label>
            <label>Закуп товара <input type="text" name="purchase"></label>
            <label>Доставка <input type="text" name="delivery"></label>
            <label>Работа/Услуги <input type="text" name="work"></label>
            <label>Доп. расходы <input type="text" name="extra"></label>
            <label>Цена продажи (ЦП) <input type="text" name="sale"></label>

            <div id="calcPreview" class="calc-preview"></div>

            <div class="dialog-actions">
                <button type="button" data-close-dialog="calcDialog" class="secondary-action">Отмена</button>
                <button type="button" id="deleteCalcButton" class="danger-action hidden">Удалить</button>
                <button type="submit" class="primary-action">Сохранить</button>
            </div>
        </form>
    </dialog>

    <dialog id="loginDialog">
        <form id="loginForm" class="dialog-form" style="width:280px;">
            <div class="dialog-head"><h3>Вход в систему</h3></div>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit" class="primary-action">Войти</button>
        </form>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
